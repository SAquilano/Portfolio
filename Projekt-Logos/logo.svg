<svg width="150" height="32" viewBox="0 0 150 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Left Candle (Orange/Accent - Lower) -->
    <path d="M10 24V8" stroke="#D97757" stroke-width="2" stroke-linecap="round"/>
    <rect x="7" y="12" width="6" height="8" rx="1" fill="#D97757"/>

    <!-- Right Candle (Dark/Black - Higher) -->
    <path d="M22 20V4" stroke="#1B1B18" stroke-width="2" stroke-linecap="round"/>
    <rect x="19" y="8" width="6" height="8" rx="1" fill="#1B1B18"/>

    <!-- Logo Text -->
    <style>
        .logo-text { font: bold 22px serif; }
        .accent { fill: #D97757; }
        .primary { fill: #1B1B18; }
    </style>
    <text x="34" y="23" class="logo-text primary">Daily<tspan class="accent">Setup</tspan></text>
</svg>
